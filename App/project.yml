name: Stash
options:
  bundleIdPrefix: dev.dmitryschab
  deploymentTarget:
    iOS: "17.0"
packages:
  TikTokBrainKit:
    path: ../TikTokBrainKit
targets:
  Stash:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources: [Sources, Resources]
    dependencies:
      - package: TikTokBrainKit
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Stash
        UILaunchScreen: {}
        # Model-box endpoints (Tailscale / local shim) are plain http.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        # Only standard HTTPS — skips the export-compliance question per build.
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.dmitryschab.Stash
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "2"
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        DEVELOPMENT_TEAM: S76KJ8Y6C3  # personal team (Dmitrijs Sabelniks) — hosts Orivox too
        CODE_SIGN_STYLE: Automatic
